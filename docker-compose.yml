services:
  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8090:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/auth/health" ]
    environment:
      - SERVER_PORT=8090
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0
      - SPRING_JPA_PROPERTIES_HIBERNATE_SHOW_SQL=false

  postgres:
    image: postgres:14.22-alpine
    container_name: postgres
    networks:
      - hmpps
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dev
    volumes:
      - ./src/main/resources/db/local/init:/docker-entrypoint-initdb.d:ro

  ingress:
    image: nginx:1.27-alpine
    container_name: ingress
    networks:
      - hmpps
    ports:
      - "80:80"
    depends_on:
      - hmpps-auth
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  hmpps:
