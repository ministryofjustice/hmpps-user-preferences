version: 2.1
parameters:
  only_pacts:
    type: boolean
    default: false
  pact_consumer_tags:
    type: string
    default: main
orbs:
  hmpps: ministryofjustice/hmpps@11
jobs:
  validate:
    executor:
      name: hmpps/java
      tag: 21.0.2-browsers
    docker:
      - image: cimg/openjdk:21.0.2-browsers
        environment:
          POSTGRES_DB: circle_test
      - image: cimg/postgres:14.9
        environment:
          POSTGRES_USER: root
          POSTGRES_DB: preferences_test
          POSTGRES_PASSWORD: dev
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-{{ checksum "build.gradle.kts" }}
            - gradle-
      - run:
          command: ./gradlew check
      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-{{ checksum "build.gradle.kts" }}
      - store_test_results:
          path: build/test-results
      - store_artifacts:
          path: build/reports/tests
  pact_check_and_publish:
    parameters:
      consumer_tags:
        type: string
    environment:
      PACTBROKER_HOST: "pact-broker-prod.apps.live-1.cloud-platform.service.justice.gov.uk"
    executor:
      name: hmpps/java
      tag: 21.0.2-browsers
    docker:
      - image: cimg/openjdk:21.0.2-browsers
        environment:
          POSTGRES_DB: circle_test
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-{{ checksum "build.gradle.kts" }}
            - gradle-
      - run:
          command: |
            PACT_PROVIDER_VERSION="$CIRCLE_SHA1" \
              PACT_PROVIDER_TAG="$CIRCLE_BRANCH" \
              PACTBROKER_CONSUMERVERSIONSELECTORS_TAGS="<< parameters.consumer_tags >>" \
              PACT_PUBLISH_RESULTS="true" \
              ./gradlew pactTestPublish
      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-{{ checksum "build.gradle.kts" }}
      - store_test_results:
          path: build/test-results
      - store_artifacts:
          path: build/reports/tests
workflows:
  version: 2
  pact:
    jobs:
      - pact_check_and_publish:
          context:
            - hmpps-common-vars
          consumer_tags: << pipeline.parameters.pact_consumer_tags >>
