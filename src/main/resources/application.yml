info.app:
  name: Hmpps User Preferences
  version: 1.0

spring:
  application:
    name: hmpps-user-preferences

#  This jackson configuration is only applied for java.util.Date.
#  It is ignored for LocalDateTime, and therefore unnecessary for most projects
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${hmppsauth.baseurl}/issuer
          jwk-set-uri: ${hmppsauth.baseurl}/.well-known/jwks.json
      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token
  http:
    codecs:
      max-in-memory-size: 10MB
  web:
    error:
      include-message: always
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/local



server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful
  error:
    include-message: always

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

springdoc:
  packagesToScan: uk.gov.justice.digital.hmpps.hmppsuserpreferences
  pathsToMatch: /users/**
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
