server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0
spring:
  datasource:
    url: 'jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE'

hmpps-auth:
  url: "http://localhost:8090/auth"

pactbroker:
  host: pact-broker-prod.apps.live-1.cloud-platform.service.justice.gov.uk
  scheme: https
  consumerversionselectors:
    tags: main

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
