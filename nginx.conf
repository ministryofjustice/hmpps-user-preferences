events {
  worker_connections 1024;
}

http {
  upstream app {
    # host.docker.internal resolves to the Docker host where bootRun is running
    server host.docker.internal:8080;
  }

  upstream auth {
    server hmpps-auth:8090;
  }

  server {
    listen 80;
    server_name localhost;

    # Proxy /auth requests to the hmpps-auth service
    location /auth/ {
      proxy_pass http://auth/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy everything else to the Spring Boot app on the host
    location / {
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

